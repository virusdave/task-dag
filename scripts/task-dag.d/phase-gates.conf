# Phase-gated epics.
#
# By default a delegated child epic counts as "satisfied" as soon as ONE
# peer-repo commit lands a `Satisfies: <repo>#<N>` trailer. That is wrong
# for multi-phase migrations: an early phase commit would let the parent
# epic close before the work is actually done.
#
# List such epics here. For a listed epic a delegated child is satisfied
# only when it records a completion whose peer commit carried a matching
# `Phase: <final-phase>` trailer (parsed by `task-dag ingest-completion`).
# Epics NOT listed keep the default "any completion satisfies" behaviour.
#
# Format (whitespace-separated, '#' comments and blank lines ignored):
#   <issue-number> <required-final-phase>
#
# Issue #13 — unified Helios-controlled landing-page engine — is an
# 8-phase (P0..P8) strangler-fig migration across FreshlyBakedNYC/automation
# and Nicponskis/mostly-static-sites. An early P0..P7 `Satisfies:` commit
# from either child must NOT close the parent; only the final P8 cutover
# does. See docs/epics/unified-landing-engine/EPIC_PLAN.md §10.
13 P8
