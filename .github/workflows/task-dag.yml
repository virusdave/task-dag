name: Task-DAG

# Self-hosting caller for task-dag's OWN issues/comments/pushes.
#
# task-dag is the single home of the reusable task-dag automation, but it
# still needs its own logic-free caller to apply that automation to its own
# repository events (GitHub only runs a workflow in response to THAT repo's
# events — see docs/MIGRATION.md "Hard platform constraint"). Without this
# file, issues opened in task-dag were never ingested into tasks/pending/<N>
# dispatch roots, so the github-worker dispatcher never saw them (e.g. the
# broken-master auto-repair epic #1 sat unpicked). This mirrors the per-peer
# caller template in docs/MIGRATION.md.
#
# NOTE: the `completion-aggregate` job is intentionally OMITTED for now —
# aggregate-cross-repo-completions.yml requires the TASK_DAG_APP_ID /
# TASK_DAG_APP_PRIVATE_KEY app secrets, which are not yet provisioned on this
# repo (`gh secret list` is empty). Adding it without those secrets would
# fail every master push. Add the job once the operator provisions the
# secrets, so `Satisfies:` trailers on task-dag commits get recorded
# automatically.
#
# This is NOT a task-dag-specific requirement. The completion-aggregate job
# is the only caller job that writes cross-repo (it posts `Satisfies …`
# completion comments onto virusdave/top-level); the built-in GITHUB_TOKEN is
# scoped to the running repo only, so it must mint a top-level installation
# token via the GitHub App (app_id/app_private_key). The other three jobs
# touch only this repo's own issues, hence GITHUB_TOKEN suffices for them.
# Every implementing peer already wires this job with the same two secrets
# (FreshlyBakedNYC/automation, Nicponskis/mostly-static-sites,
# Nicponskis/nixos-sbc, virusdave/top-level — see docs/MIGRATION.md per-peer
# template). `virusdave` is a user, not an org, so there is no org-wide
# secret; each repo carries its own copy. task-dag simply needs it now
# because, for the first time, it hosts its own commits that satisfy a
# top-level epic (the broken-master auto-repair work, `Satisfies:
# virusdave/top-level#26`).

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  push:
    branches: [master]

jobs:
  issue-to-task:
    if: ${{ github.event_name == 'issues' }}
    uses: virusdave/task-dag/.github/workflows/issue-to-task.yml@master
    permissions:
      contents: write
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  comment-sync:
    if: ${{ github.event_name == 'issue_comment' }}
    # Serialize ingestion per issue so concurrent comments cannot race
    # through comment-sync -> ingest-comment. Distinct issues stay parallel.
    concurrency:
      group: task-dag-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    uses: virusdave/task-dag/.github/workflows/sync-comment-to-task.yml@master
    permissions:
      contents: write
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  close-completed:
    if: ${{ github.event_name == 'push' }}
    uses: virusdave/task-dag/.github/workflows/close-completed-issues.yml@master
    permissions:
      contents: read
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
