name: Task-DAG

# Self-hosting caller for task-dag's OWN issues/comments/pushes.
#
# task-dag is the single home of the reusable task-dag automation, but it
# still needs its own logic-free caller to apply that automation to its own
# repository events (GitHub only runs a workflow in response to THAT repo's
# events — see docs/MIGRATION.md "Hard platform constraint"). Without this
# file, issues opened in task-dag were never ingested into tasks/pending/<N>
# dispatch roots, so the github-worker dispatcher never saw them (e.g. the
# broken-master auto-repair epic #1 sat unpicked). This mirrors the per-peer
# caller template in docs/MIGRATION.md.
#
# This caller is the canonical per-peer template (all five jobs, including
# `completion-aggregate` and `materialise`) so task-dag's infra config matches
# every other provisioned peer (FreshlyBakedNYC/automation,
# Nicponskis/mostly-static-sites, Nicponskis/nixos-sbc, virusdave/top-level).
# See docs/MIGRATION.md.
#
# `completion-aggregate` and `materialise` are the caller jobs that write
# cross-repo: the former posts `Satisfies …` completion comments onto
# virusdave/top-level; the latter creates peer-repo issues from
# `Materialise-Child-Epic:` trailers. The built-in GITHUB_TOKEN is scoped to
# the running repo only, so both mint a peer installation token via the GitHub
# App (app_id/app_private_key). The other three jobs touch only this repo's
# own issues, hence GITHUB_TOKEN suffices for them. `virusdave` is a user, not
# an org, so there is no org-wide secret; each repo carries its own copy.
#
# OPERATOR PREREQUISITE — provision these TWO repo secrets BEFORE this lands
# on master, or the `completion-aggregate` job will fail every master push:
#   TASK_DAG_APP_ID, TASK_DAG_APP_PRIVATE_KEY
# They are the SAME values already set on the other four peers (the one
# shared task-dag GitHub App). Exact steps: docs/SECRETS.md.

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  push:
    branches: [master]

jobs:
  issue-to-task:
    if: ${{ github.event_name == 'issues' }}
    uses: virusdave/task-dag/.github/workflows/issue-to-task.yml@master
    permissions:
      contents: write
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  # Monotonic-completion reopen notice (issue #13, operator decision #2). When
  # an issue is REOPENED, completion stays MONOTONIC: create-task-commit.sh
  # (the issue-to-task job above) is create-only, so it never rewrites
  # tasks/pending/<N> — no phantom task is dispatched on reopen. This branch
  # adds the operator-facing half: it upserts ONE `<!-- task-dag:status -->`-
  # markered, NON-task-creating comment stating the completed task stays done
  # and a worker must be told in-thread to open a NEW task if more work is
  # needed. Gated on the `reopened` action so it fires ONLY on reopen (the
  # issue-to-task job still handles opened/edited). Not latency-sensitive; a
  # missed event is harmless (no task is created either way) and the notice is
  # purely advisory.
  reopen-notice:
    if: ${{ github.event_name == 'issues' && github.event.action == 'reopened' }}
    uses: virusdave/task-dag/.github/workflows/reopen-notice.yml@master
    permissions:
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  comment-sync:
    if: ${{ github.event_name == 'issue_comment' }}
    # Serialize ingestion per issue so concurrent comments cannot race
    # through comment-sync -> ingest-comment -> close-epic. Distinct issues
    # stay parallel.
    concurrency:
      group: task-dag-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    uses: virusdave/task-dag/.github/workflows/sync-comment-to-task.yml@master
    with:
      # Runtime and reusable workflow must resolve from the same ref.
      ref: master
    permissions:
      contents: write
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      # task-dag can act as a delegating PARENT (it wires `materialise`, so it
      # can spawn cross-repo child epics and later run `task-dag close-epic`).
      # close-epic pushes a `Closes-Epic: #N` merge to master; a GITHUB_TOKEN
      # push can NOT trigger the push-reactive close-completed workflow (GitHub
      # recursion guard, issue #9). Pass the App creds so comment-sync pushes
      # that merge with the shared App token (which already holds contents:write
      # — see docs/SECRETS.md), which DOES trigger close-completed. Opt-in and
      # no-op on trailer-free / non-close pushes.
      app_id: ${{ secrets.TASK_DAG_APP_ID }}
      app_private_key: ${{ secrets.TASK_DAG_APP_PRIVATE_KEY }}

  close-completed:
    # Push path is the low-latency projection update. Schedule/manual are the
    # master-derived backstop for missed workflow triggers or semantic bot
    # pushes whose close fact is already durable on master.
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: virusdave/task-dag/.github/workflows/close-completed-issues.yml@master
    permissions:
      # contents: write (not read) — the close script deletes the stale
      # tasks/pending/<N> + tasks/root-active/<N> refs after closing the
      # issue. Must match the reusable workflow's declared write (a caller
      # that grants less than the reusable workflow declares is a startup
      # failure: reusable perms can only narrow the caller's, not widen).
      contents: write
      issues: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  graph-converge:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: virusdave/task-dag/.github/workflows/graph-converge.yml@master
    permissions:
      contents: write
    with:
      base_sha: ${{ github.event_name == 'push' && github.event.before || '' }}
      head_sha: ${{ github.event_name == 'push' && github.sha || '' }}

  completion-aggregate:
    if: ${{ github.event_name == 'push' }}
    uses: virusdave/task-dag/.github/workflows/aggregate-cross-repo-completions.yml@master
    with:
      base_sha: ${{ github.event.before }}
      head_sha: ${{ github.sha }}
    secrets:
      app_id: ${{ secrets.TASK_DAG_APP_ID }}
      app_private_key: ${{ secrets.TASK_DAG_APP_PRIVATE_KEY }}
