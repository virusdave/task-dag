name: Graph Converge

on:
  workflow_call:
    inputs:
      base_sha:
        description: github.event.before from a push; empty for periodic backstop only.
        required: false
        type: string
        default: ''
      head_sha:
        description: github.sha from a push; empty for periodic backstop only.
        required: false
        type: string
        default: ''
      ref:
        description: task-dag ref to fetch the canonical CLI from.
        required: false
        type: string
        default: master

permissions:
  contents: write

jobs:
  converge:
    runs-on: ubuntu-latest
    concurrency:
      group: graph-converge-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download canonical task-dag CLI bundle
        env:
          TASK_DAG_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/task-dag-cli
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            "https://github.com/virusdave/task-dag/archive/${TASK_DAG_REF}.tar.gz" \
            | tar -xz --strip-components=1 -C /tmp/task-dag-cli
          chmod 0755 /tmp/task-dag-cli/scripts/task-dag

      - name: Converge dependency graph
        env:
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GIT_AUTHOR_NAME: task-dag[bot]
          GIT_AUTHOR_EMAIL: task-dag[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: task-dag[bot]
          GIT_COMMITTER_EMAIL: task-dag[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          args=()
          zero=0000000000000000000000000000000000000000
          if [[ -n "${HEAD_SHA}" ]]; then
            if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "${zero}" ]]; then
              args+=(--range "${HEAD_SHA}")
            else
              args+=(--range "${BASE_SHA}..${HEAD_SHA}")
            fi
          fi
          set +e
          /tmp/task-dag-cli/scripts/task-dag graph-converge "${args[@]}"
          rc=$?
          set -e
          if [ "$rc" -eq 75 ]; then
            echo "Graph convergence deferred successfully during semantic migration drain."
            exit 0
          fi
          exit "$rc"
