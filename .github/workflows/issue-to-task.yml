name: Issue to Task Metadata Commit (Reusable)

# Reusable version of the per-repo issue-to-task workflow. The caller wires
# its own `issues` event; this workflow fetches the canonical
# create-task-commit.sh from virusdave/task-dag and runs it against the
# caller's checkout (the script is self-contained: git + gh only).

on:
  workflow_call:
    inputs:
      ref:
        description: 'task-dag ref to fetch the helper script from (branch, tag, or SHA)'
        type: string
        default: main
    secrets:
      token:
        description: 'GitHub token for API + git access (needs contents:write, issues:write)'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  create-task-commit:
    runs-on: ubuntu-latest
    # Serialize opened/reopened/edited runs for the SAME issue so two
    # first-seen runs can't race to create the epic. (create-task-commit.sh
    # is also race-tolerant via --atomic push + lost-race handling; this
    # just avoids the noise.)
    concurrency:
      group: issue-to-task-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token }}

      - name: Download create-task-commit script
        run: |
          curl -fsSL "https://raw.githubusercontent.com/virusdave/task-dag/${{ inputs.ref }}/.github/scripts/create-task-commit.sh" \
            -o /tmp/create-task-commit.sh
          chmod +x /tmp/create-task-commit.sh

      - name: Create metadata commit for issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GH_TOKEN: ${{ secrets.token }}
        run: bash /tmp/create-task-commit.sh
