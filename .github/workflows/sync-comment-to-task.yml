name: Sync Comment to Task-DAG (Reusable)

on:
  workflow_call:
    inputs:
      max_comment_size:
        description: 'Maximum comment size in bytes'
        type: number
        default: 2048
      max_daily_comments:
        description: 'Maximum agent comments per issue per day'
        type: number
        default: 20
      enable_auto_frontier:
        description: 'Automatically mark work-request comments as frontier tasks'
        type: boolean
        default: true
      ref:
        description: 'task-dag ref to fetch helper scripts from (branch, tag, or SHA)'
        type: string
        default: master
    secrets:
      token:
        description: 'GitHub token for API access'
        required: true
      # OPTIONAL task-dag GitHub App credentials. Supply BOTH on a repo whose
      # comment-sync can auto-close cross-repo delegated epics (i.e. it runs
      # `task-dag close-epic`, which pushes a tree-equal `Closes-Epic: #N`
      # merge to master). A push made with the default GITHUB_TOKEN can NOT
      # start a new `push` workflow run (GitHub's recursion guard), so that
      # close merge never triggers close-completed-issues.yml and the issue is
      # never closed / tasks/pending/<N> never cleaned up (issue #9). When both
      # secrets are set this job mints a GitHub App installation token and uses
      # it as the git remote credential, so the close-epic master push is
      # App-authenticated and DOES trigger close-completed. The App must have
      # `contents: write` on this repo (see docs/SECRETS.md).
      #
      # Omit both to keep the legacy GITHUB_TOKEN-only behaviour (identical to
      # before this change) — fine for any repo that never auto-closes a
      # cross-repo delegated epic.
      app_id:
        description: 'task-dag GitHub App ID (optional; enables App-authenticated close-epic pushes)'
        required: false
      app_private_key:
        description: 'task-dag GitHub App private key (PEM; optional; pair with app_id)'
        required: false

permissions:
  contents: write
  issues: write

jobs:
  sync-comment-to-task:
    runs-on: ubuntu-latest

    steps:
      # Decide whether the optional App credentials were supplied. Secrets
      # cannot be referenced in a step-level `if:`, so surface their presence
      # as a plain output the mint/checkout steps can branch on. The creds are
      # a matched pair: supplying exactly one is a misconfiguration that must
      # fail closed (supplying only the private key would otherwise silently
      # skip the mint and fall back to GITHUB_TOKEN, recreating the bug). Pass
      # only booleans into the shell, never the secret values themselves.
      - name: Detect optional App credentials
        id: detect
        env:
          HAS_APP_ID: ${{ secrets.app_id != '' }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.app_private_key != '' }}
        run: |
          if [ "$HAS_APP_ID" != "$HAS_APP_PRIVATE_KEY" ]; then
            echo "::error::app_id and app_private_key must be supplied together (got exactly one)"
            exit 1
          fi
          if [ "$HAS_APP_ID" = "true" ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi

      # Mint an installation token for THIS repo when App creds are supplied.
      # Fail-closed: if the creds are present but the mint fails, this step
      # (and the job) fails rather than silently falling back to GITHUB_TOKEN,
      # which would land a close-epic merge that never triggers close-completed
      # (exactly the bug we are fixing). Skipped entirely when no App creds.
      - name: Mint App installation token (opt-in)
        id: mint
        if: steps.detect.outputs.has_app == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persisted as the git remote credential for the whole job. When the
          # App token was minted, git pushes (notably the close-epic master
          # merge) are App-authenticated and trigger `push` workflows; else we
          # fall back to the caller's GITHUB_TOKEN (unchanged legacy path). The
          # gh-API `GITHUB_TOKEN` below stays the caller token (own-repo issue
          # ops only), so only the git push credential changes.
          token: ${{ steps.mint.outputs.token || secrets.token }}

      # Resolve the helper, CLI, modules, and config in one git checkout. A
      # single checkout cannot mix files from different moving-ref revisions,
      # unlike the former sequence of raw-file downloads. Do not persist this
      # public read credential: the caller checkout above retains the App or
      # GITHUB_TOKEN credential used by close-epic pushes.
      - name: Checkout coherent task-dag runtime
        uses: actions/checkout@v4
        with:
          repository: virusdave/task-dag
          ref: ${{ inputs.ref }}
          path: .task-dag-runtime
          fetch-depth: 1
          persist-credentials: false

      - name: Sync comment to task-dag
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_REPO: ${{ github.repository }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_UPDATED_AT: ${{ github.event.comment.updated_at }}
          MAX_COMMENT_SIZE: ${{ inputs.max_comment_size }}
          ENABLE_AUTO_FRONTIER: ${{ inputs.enable_auto_frontier }}
        working-directory: ${{ github.workspace }}
        run: |
          .task-dag-runtime/scripts/sync-comment-to-tasks.sh
