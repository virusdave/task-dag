name: task-dag CLI drift guard

# Fails the caller's CI if its vendored task-dag CLI has drifted from the
# canonical copy in the coordinating repo.
#
# There is ONE canonical task-dag CLI. Peer repos vendor a byte-identical
# copy because GitHub Actions runners only have the checked-out repo on
# disk and cannot reach the canonical repo at runtime. This guard makes
# the "copies silently fork" failure mode impossible: any divergence in
# `scripts/task-dag` or `scripts/task-dag.d/` from canonical@<canonical_ref>
# turns the build red. See virusdave/top-level:docs/task_dag/CLI_DISTRIBUTION.md
#
# NOTE (consolidation, 2026-06-16): the canonical CLI home is migrating
# from virusdave/top-level to virusdave/task-dag (this repo). During the
# migration the `canonical_repo` default below stays virusdave/top-level so
# already-pinned peers keep passing; flip it to virusdave/task-dag once the
# CLI officially lands here as source-of-truth. Because task-dag is PUBLIC,
# the App-token mint can then be dropped in favour of an unauthenticated
# public checkout. See docs/MIGRATION.md.
#
# Pin `canonical_ref` to the exact canonical SHA the peer was last synced
# from (NOT a floating branch), so unrelated future canonical changes do
# not break every peer's CI at once. A separate scheduled fleet audit can
# report peers that lag the latest canonical.

on:
  workflow_call:
    inputs:
      canonical_repo:
        description: Coordinating repo that owns the canonical CLI (owner/repo).
        required: false
        type: string
        default: virusdave/top-level
      canonical_ref:
        description: |
          Exact canonical commit SHA (or tag) this peer is synced to.
          Pin a SHA, not a branch, so canonical churn can't break peers.
        required: true
        type: string
    secrets:
      app_id:
        description: |
          GitHub App ID used to read the (private) canonical repo. The App
          must be installed on the canonical repo with Contents: Read.
          Typically stored as repo/org secret TASK_DAG_APP_ID.
        required: true
      app_private_key:
        description: |
          PEM-encoded private key for the same GitHub App.
          Typically stored as repo/org secret TASK_DAG_APP_PRIVATE_KEY.
        required: true

permissions:
  contents: read

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Split canonical_repo into owner / repo
        id: split
        env:
          CANONICAL_REPO: ${{ inputs.canonical_repo }}
        run: |
          owner="${CANONICAL_REPO%%/*}"
          repo="${CANONICAL_REPO#*/}"
          if [[ -z "${owner}" || -z "${repo}" || "${owner}" == "${CANONICAL_REPO}" ]]; then
            echo "::error::canonical_repo must be owner/repo, got: ${CANONICAL_REPO}"
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}"   >> "$GITHUB_OUTPUT"

      - name: Mint installation token for canonical repo
        id: mint
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ steps.split.outputs.owner }}
          repositories: ${{ steps.split.outputs.repo }}

      - name: Checkout caller repository (the vendored copy)
        uses: actions/checkout@v4
        with:
          path: peer

      - name: Checkout canonical repository at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.canonical_repo }}
          ref: ${{ inputs.canonical_ref }}
          token: ${{ steps.mint.outputs.token }}
          path: canonical

      - name: Compare vendored CLI against canonical
        env:
          CANONICAL_REPO: ${{ inputs.canonical_repo }}
          CANONICAL_REF: ${{ inputs.canonical_ref }}
        run: |
          set -uo pipefail
          rc=0

          # The vendored CLI must exist in the peer.
          if [[ ! -f peer/scripts/task-dag ]]; then
            echo "::error::peer is missing scripts/task-dag (expected a vendored copy)"
            exit 1
          fi

          # 1) The executable must be byte-identical.
          if ! diff -u canonical/scripts/task-dag peer/scripts/task-dag; then
            echo "::error::scripts/task-dag has DRIFTED from ${CANONICAL_REPO}@${CANONICAL_REF}."
            echo "::error::Never edit the vendored copy. Re-sync from canonical (see CLI_DISTRIBUTION.md)."
            rc=1
          fi

          # 2) It must be executable.
          if [[ ! -x peer/scripts/task-dag ]]; then
            echo "::error::peer/scripts/task-dag is not executable (chmod +x and re-commit)."
            rc=1
          fi

          # 3) The extension dir must match exactly (added/removed/changed files).
          if [[ -d canonical/scripts/task-dag.d ]]; then
            if [[ ! -d peer/scripts/task-dag.d ]]; then
              echo "::error::peer is missing scripts/task-dag.d/ (canonical ships extension modules)."
              rc=1
            elif ! diff -ru canonical/scripts/task-dag.d peer/scripts/task-dag.d; then
              echo "::error::scripts/task-dag.d/ has DRIFTED from ${CANONICAL_REPO}@${CANONICAL_REF}."
              rc=1
            fi
          fi

          if [[ "$rc" -eq 0 ]]; then
            echo "task-dag CLI is in sync with ${CANONICAL_REPO}@${CANONICAL_REF}."
          fi
          exit "$rc"
