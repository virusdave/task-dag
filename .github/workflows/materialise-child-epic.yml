name: Reconcile Durable Child Epic Intents

# REUSABLE workflow (on: workflow_call). Call it from a peer repo's
# .github/workflows/task-dag.yml on `push: branches: [master]` to make that
# repo able to spawn cross-repo child epics.
#
# Each invocation reconciles immutable, pre-reserved intents already stored
# on tasks/v1/materialisation. The reconciler is the sole issue POST actuator:
# it mints a peer-scoped App token, durably fences one create attempt,
# exhaustively recovers by exact sentinel identity, and then runs canonical
# marker, delegation, and edge finalization.
#
# The canonical runtime is checked out from public virusdave/task-dag at the
# exact commit in `inputs.ref`, so its mutator, guard, and policy cannot come
# from mixed revisions. The caller does not need to vendor the scripts.
#
# The exact runtime commit must match the immutable producer-enable record;
# moving branches and mixed revisions are rejected before effects.
#
# Each final materialisation validates an operation-bound empty-tree marker,
# canonical delegation ref, and canonical dependency edge before recording
# `final` in the immutable slot state chain.

on:
  workflow_call:
    inputs:
      base_sha:
        description: github.event.before from the caller (40-zero on first push).
        required: true
        type: string
      head_sha:
        description: github.sha from the caller.
        required: true
        type: string
      ref:
        description: 'Exact 40-hex task-dag commit containing the authorized reconciler'
        required: false
        type: string
        default: ''
    secrets:
      app_id:
        description: |
          GitHub App ID for the task-dag cross-repo bot. The App must be
          installed on every peer repo a child epic may be materialised in,
          with Issues: read & write. Typically stored as repo/org secret
          TASK_DAG_APP_ID.
        required: true
      app_private_key:
        description: |
          PEM-encoded private key for the same GitHub App.
          Typically stored as repo/org secret TASK_DAG_APP_PRIVATE_KEY.
        required: true

# The App token minted at runtime is what creates peer-repo issues; the
# caller's GITHUB_TOKEN needs contents:write to push the marker + delegation
# refs and issues:write so `delegate` can update the parent epic body (and
# failure paging can comment on the parent issue). Set explicitly — do not
# rely on repo defaults.
permissions:
  contents: write
  issues: write

jobs:
  materialise:
    # Compatibility-safe staging: old callers omit ref and perform no work.
    # The coordinated rollout pins both `uses:` and this input before enabling.
    if: ${{ inputs.ref != '' }}
    runs-on: ubuntu-latest
    concurrency:
      # Parent-issue projection is a whole-body read/modify/write. Serialize
      # every repository invocation so two slots cannot overwrite each
      # other's successfully projected delegation block.
      group: materialise-child-epic-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out pinned canonical task-dag runtime
        uses: actions/checkout@v4
        with:
          repository: virusdave/task-dag
          ref: ${{ inputs.ref }}
          path: .task-dag-runtime
          fetch-depth: 0
          persist-credentials: false

      - name: Verify pinned canonical task-dag runtime
        env:
          TASK_DAG_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          [[ "$TASK_DAG_REF" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error ::task-dag reconciler runtime must be pinned to an exact 40-hex commit"
            exit 2
          }
          test "$(git -C .task-dag-runtime rev-parse HEAD)" = "$TASK_DAG_REF"
          source .task-dag-runtime/scripts/task-dag.d/activation.sh
          taskdag_full_history_checkout .task-dag-runtime || {
            echo "::error ::task-dag reconciler runtime must be a readable full-history, non-partial, non-promisor checkout"
            exit 2
          }
          chmod 0755 .task-dag-runtime/scripts/task-dag

      - name: Reconcile immutable materialisation intents
        env:
          GH_TOKEN: ${{ github.token }}
          TASKDAG_APP_ID: ${{ secrets.app_id }}
          TASKDAG_APP_PRIVATE_KEY: ${{ secrets.app_private_key }}
        run: |
          set -euo pipefail
          set +e
          "$GITHUB_WORKSPACE/.task-dag-runtime/scripts/task-dag" materialise-reconcile
          rc=$?
          set -e
          if [ "$rc" -eq 75 ]; then
            echo "One or more materialisations remain safely uncertain or pending; watchdog reconciliation will continue."
            exit 0
          fi
          exit "$rc"
