name: Materialise Child Epic From Commit Trailer

# REUSABLE workflow (on: workflow_call). Call it from a peer repo's
# .github/workflows/task-dag.yml on `push: branches: [master]` to make that
# repo able to spawn cross-repo child epics.
#
# When a push lands on the caller's master, this scans the new commits
# (inputs.base_sha..inputs.head_sha) for `Materialise-Child-Epic:` trailer
# groups and, for each:
#
#   1. Mints a `task-dag` GitHub App installation token scoped to the peer
#      repo named in the trailer (the App must be installed on that peer
#      with Issues: read & write).
#   2. Creates the peer-repo issue from the trailer-specified body file
#      (read from the trailer commit's tree in the caller checkout).
#   3. Registers the delegation back on the parent epic (in THIS caller /
#      source repo) via the canonical `task-dag delegate`.
#
# This works for ANY wired peer, not just virusdave/top-level: the source
# repo is `github.repository` and its token is passed as SOURCE_TOKEN.
#
# The canonical runtime is downloaded as one archive from public
# virusdave/task-dag at `inputs.ref`, so its mutator, guard, and policy cannot
# come from mixed revisions. The caller does not need to vendor the scripts.
#
# Idempotency: each materialisation pushes a marker ref pointing at an
# empty-tree metadata commit recording the assigned peer issue number.
# Groups without a `Child-Epic-Slug:` trailer use the legacy
#   refs/heads/gh/child-epics/<parent>/<owner>/<repo>
# ref (one child epic per (parent, peer repo)); groups WITH a slug use
#   refs/heads/gh/child-epic-slots/<parent>/<owner>/<repo>/<slug>
# which permits multiple child epics per (parent, peer repo). See the
# script header in materialise-child-epics.sh for the full trailer contract.

on:
  workflow_call:
    inputs:
      base_sha:
        description: github.event.before from the caller (40-zero on first push).
        required: true
        type: string
      head_sha:
        description: github.sha from the caller.
        required: true
        type: string
      ref:
        description: 'task-dag ref to fetch the materialise script from (branch, tag, or SHA)'
        required: false
        type: string
        default: master
    secrets:
      app_id:
        description: |
          GitHub App ID for the task-dag cross-repo bot. The App must be
          installed on every peer repo a child epic may be materialised in,
          with Issues: read & write. Typically stored as repo/org secret
          TASK_DAG_APP_ID.
        required: true
      app_private_key:
        description: |
          PEM-encoded private key for the same GitHub App.
          Typically stored as repo/org secret TASK_DAG_APP_PRIVATE_KEY.
        required: true

# The App token minted at runtime is what creates peer-repo issues; the
# caller's GITHUB_TOKEN needs contents:write to push the marker + delegation
# refs and issues:write so `delegate` can update the parent epic body (and
# failure paging can comment on the parent issue). Set explicitly — do not
# rely on repo defaults.
permissions:
  contents: write
  issues: write

jobs:
  materialise:
    runs-on: ubuntu-latest
    concurrency:
      group: materialise-child-epic-${{ github.repository }}-${{ inputs.base_sha }}-${{ inputs.head_sha }}
      cancel-in-progress: false

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download canonical task-dag bundle
        env:
          TASK_DAG_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/task-dag-cli
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            "https://github.com/virusdave/task-dag/archive/${TASK_DAG_REF}.tar.gz" \
            | tar -xz --strip-components=1 -C /tmp/task-dag-cli
          chmod 0755 /tmp/task-dag-cli/scripts/task-dag \
            /tmp/task-dag-cli/.github/scripts/materialise-child-epics.sh

      - name: Materialise child epics from commit trailers
        env:
          BEFORE_SHA: ${{ inputs.base_sha }}
          AFTER_SHA: ${{ inputs.head_sha }}
          GH_REPO: ${{ github.repository }}
          SOURCE_TOKEN: ${{ github.token }}
          APP_ID: ${{ secrets.app_id }}
          APP_PRIVATE_KEY: ${{ secrets.app_private_key }}
          TASK_DAG: /tmp/task-dag-cli/scripts/task-dag
        run: |
          set -euo pipefail
          set +e
          bash /tmp/task-dag-cli/.github/scripts/materialise-child-epics.sh
          rc=$?
          set -e
          if [ "$rc" -eq 75 ]; then
            echo "Child-epic materialisation deferred successfully during semantic migration drain."
            exit 0
          fi
          exit "$rc"
