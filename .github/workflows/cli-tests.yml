name: task-dag CLI tests

# Central quality gate for the canonical task-dag CLI. This REPLACES the
# per-repo task-dag-drift-guard that used to compare each peer's vendored
# copy against top-level (now retired with the vendored copies). The
# fixture tests are self-contained (each builds a throwaway bare origin +
# clone in a tempdir; no network, no real repo).

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/task-dag.yml'
      - '.github/workflows/sync-comment-to-task.yml'
      - 'scripts/task-dag'
      - 'scripts/sync-comment-to-tasks.sh'
      - 'scripts/validate-caller-workflow.sh'
      - 'scripts/task-dag.d/**'
      - 'scripts/run-rust-tests.sh'
      - 'tests/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'flake.lock'
      - 'flake.nix'
      - 'src/**'
      - 'docs/MIGRATION.md'
      - '.github/scripts/**'
      - '.github/workflows/cli-tests.yml'
  pull_request:
    paths:
      - '.github/workflows/task-dag.yml'
      - '.github/workflows/sync-comment-to-task.yml'
      - 'scripts/task-dag'
      - 'scripts/sync-comment-to-tasks.sh'
      - 'scripts/validate-caller-workflow.sh'
      - 'scripts/task-dag.d/**'
      - 'scripts/run-rust-tests.sh'
      - 'tests/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'flake.lock'
      - 'flake.nix'
      - 'src/**'
      - 'docs/MIGRATION.md'
      - '.github/scripts/**'
      - '.github/workflows/cli-tests.yml'

permissions:
  contents: read

jobs:
  cli-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3.21.5
        with:
          github-token: ''
      - name: Rust tests + shellcheck + bash -n + fixture smoke
        run: bash tests/task-dag/run-all.sh
