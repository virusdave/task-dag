name: Aggregate Cross-Repo Completions

on:
  workflow_call:
    inputs:
      top_level_repo:
        description: Top-level coordinating repository (owner/repo).
        required: false
        type: string
        default: virusdave/top-level
      base_sha:
        description: github.event.before from the caller.
        required: true
        type: string
      head_sha:
        description: github.sha from the caller.
        required: true
        type: string
      ref:
        description: 'task-dag ref to fetch helper scripts from (branch, tag, or SHA)'
        required: false
        type: string
        default: main
    secrets:
      app_id:
        description: |
          GitHub App ID for the task-dag cross-repo bot. The App must
          be installed on the top-level repo with Issues: Read & write.
          Typically stored as repo/org secret TASK_DAG_APP_ID.
        required: true
      app_private_key:
        description: |
          PEM-encoded private key for the same GitHub App.
          Typically stored as repo/org secret TASK_DAG_APP_PRIVATE_KEY.
        required: true

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    concurrency:
      group: aggregate-cross-repo-${{ github.repository }}-${{ inputs.base_sha }}-${{ inputs.head_sha }}
      cancel-in-progress: false

    steps:
      - name: Split top_level_repo into owner / repo
        id: split
        env:
          TOP_LEVEL_REPO: ${{ inputs.top_level_repo }}
        run: |
          owner="${TOP_LEVEL_REPO%%/*}"
          repo="${TOP_LEVEL_REPO#*/}"
          if [[ -z "${owner}" || -z "${repo}" || "${owner}" == "${TOP_LEVEL_REPO}" ]]; then
            echo "::error::top_level_repo must be owner/repo, got: ${TOP_LEVEL_REPO}"
            exit 1
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}"   >> "$GITHUB_OUTPUT"

      - name: Mint installation token for top-level repo
        id: mint
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ steps.split.outputs.owner }}
          repositories: ${{ steps.split.outputs.repo }}

      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download aggregator script
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/virusdave/task-dag/${{ inputs.ref }}/scripts/aggregate-cross-repo-completions.sh" \
            -o /tmp/aggregate-cross-repo-completions.sh
          chmod 0755 /tmp/aggregate-cross-repo-completions.sh

      - name: Aggregate cross-repo completions
        env:
          GH_TOKEN: ${{ steps.mint.outputs.token }}
          TOP_LEVEL_REPO: ${{ inputs.top_level_repo }}
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PEER_REPO: ${{ github.repository }}
        run: |
          /tmp/aggregate-cross-repo-completions.sh
