name: Close Completed Task Issues (Reusable)

# Reusable version of the per-repo close-completed-issues workflow. The
# caller wires its own `push` event; this workflow checks out one coherent
# task-dag runtime and runs its projection script against the caller checkout.
# The script, migration guard, policy, cleaner, and CLI therefore cannot come
# from mixed revisions.

on:
  workflow_call:
    inputs:
      ref:
        description: 'task-dag ref to fetch the helper script from (branch, tag, or SHA)'
        type: string
        default: master
    secrets:
      token:
        description: 'GitHub token for API access (needs issues:write)'
        required: true

# NOTE: this reusable workflow deliberately does NOT declare its own
# `permissions:` block. It INHERITS the calling job's granted permissions.
#
# It needs BOTH `issues: write` (to `gh issue close`) and `contents: write`
# (the close script deletes the now-stale `refs/heads/tasks/pending/<N>` and
# `refs/heads/tasks/root-active/<N>` refs via `git push --delete`; read-only
# would leave orphan epic-root refs for CLOSED issues — wasted dispatch).
# So every CALLER's close-completed job must grant
# `permissions: { contents: write, issues: write }` (see docs/MIGRATION.md).
#
# Why inherit instead of declaring `contents: write` here: a reusable
# workflow that declares MORE than the caller granted is a hard startup
# failure (reusable perms can only narrow the caller's, never widen them).
# Declaring write here would break every not-yet-updated caller's run on
# EVERY push. By inheriting, an un-updated `contents: read` caller degrades
# gracefully — the close script still runs and FAILS LOUDLY (exit 1) only
# when it actually has an epic to clean up — instead of failing at startup.

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token }}

      - name: Checkout coherent task-dag runtime
        uses: actions/checkout@v4
        with:
          repository: virusdave/task-dag
          ref: ${{ inputs.ref }}
          path: .task-dag-runtime
          fetch-depth: 1
          persist-credentials: false

      - name: Close issues for completed task epics
        env:
          GH_TOKEN: ${{ secrets.token }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CLEANUP_REFS_SCRIPT: .task-dag-runtime/.github/scripts/cleanup-closed-issue-task-refs.sh
          TASK_DAG_CLI: .task-dag-runtime/scripts/task-dag
        run: |
          set -euo pipefail
          set +e
          bash .task-dag-runtime/.github/scripts/close-completed-issues.sh
          rc=$?
          set -e
          if [ "$rc" -eq 75 ]; then
            echo "Completed-issue projection deferred successfully during semantic migration drain."
            exit 0
          fi
          exit "$rc"
