# Task-DAG configuration — DEFAULTS / TEMPLATE
#
# Each consuming repo keeps its own .task-dag-config.yml with these keys.
# This file documents the canonical defaults so peers only override what
# differs. Reusable workflows accept the rate/feature knobs as workflow
# inputs; the values here are the recommended baseline.

# Comment limits
max_comment_size: 2048
max_daily_comments: 20

# Rate limits
max_active_issues: 20

# Feature flags
enable_auto_frontier: true
enable_state_change_tasks: false  # V2 feature

# Refs namespace
refs_namespace: "refs/gh"
